name: ci
on:
  push:
    branches: ['**']  # every branch, but NOT tag pushes (a tag re-runs CI on an old release commit)
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest -q
