name: leak-gate
on:
  push:
  pull_request:

# Mechanical privacy gate (design doc D8): no real/private transcript content may enter the repo.
jobs:
  leak-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/leak_gate.py
