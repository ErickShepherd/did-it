name: leak-gate
on:
  push:
    branches: ['**']  # every branch, but NOT tag pushes (a tag re-runs on an old release commit)
  pull_request:

# Mechanical privacy gate (design doc D8): no real/private transcript content may enter the repo.
jobs:
  leak-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python3 scripts/leak_gate.py
